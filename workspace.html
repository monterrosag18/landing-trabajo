<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SupCrud - Workspace Panel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/workspace.css">
</head>

<body class="dashboard-body">

    <!-- Top Workspace Selector / Nav -->
    <header class="workspace-topbar">
        <div class="logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#4A90E2" stroke-width="2"
                stroke-linejoin="round">
                <path d="M12 2L2 7L12 12L22 7L12 2Z" />
                <path d="M2 17L12 22L22 17" />
                <path d="M2 12L12 17L22 12" />
            </svg>
            <span class="logo-text">SupCrud <small>by Crudzaso</small></span>
        </div>

        <div class="ws-selector neumorphic-inset">
            <span class="label">SELECT WORKSPACE: </span>
            <select id="workspaceSelect" class="ws-dropdown">
                <option value="cb1">Cafe Bistro Sol</option>
                <option value="nx1">Nexus Riwi</option>
            </select>
        </div>

        <div class="user-profile">
            <img src="https://ui-avatars.com/api/?name=User&background=random" id="dashboardAvatar" alt="Agent"
                class="avatar">
            <div class="user-info">
                <span class="user-name" id="dashboardUserName">Maria Silva</span>
                <span class="user-email" id="dashboardUserEmail">AGENT</span>
            </div>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round" class="bell-icon">
                <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
            </svg>
            <button id="btnLogout" class="neumorphic-btn btn-sm text-danger"
                style="margin-left: 15px; padding: 6px 12px; font-size: 0.8rem; font-weight: 600;">Log Out</button>
        </div>
    </header>

    <div class="workspace-layout">
        <!-- Sidebar -->
        <aside class="ws-sidebar">
            <ul class="sidebar-menu">
                <li><a href="#"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                            <polyline points="9 22 9 12 15 12 15 22"></polyline>
                        </svg> Dashboard</a></li>
                <li class="active"><a href="#"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2">
                            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z">
                            </path>
                        </svg> Ticket Inbox</a></li>
                <li><a href="#"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                            <circle cx="9" cy="7" r="4"></circle>
                            <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                            <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                        </svg> Agents Management</a></li>
                <li><a href="#"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <rect x="3" y="3" width="7" height="7"></rect>
                            <rect x="14" y="3" width="7" height="7"></rect>
                            <rect x="14" y="14" width="7" height="7"></rect>
                            <rect x="3" y="14" width="7" height="7"></rect>
                        </svg> Add-ons Config</a></li>
                <li><a href="#"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>
                            <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
                        </svg> Knowledge Base</a></li>
            </ul>
        </aside>

        <!-- Main Content -->
        <main class="ws-main">
            <div class="page-header">
                <div>
                    <h1 class="page-title">Ticket Inbox</h1>
                </div>
            </div>

            <!-- Filters Bar -->
            <div class="filters-bar neumorphic">
                <div class="search-wrap neumorphic-inset">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <input type="text" id="searchInput" placeholder="Search by Reference Code or Subject..."
                        class="filter-input input-expand">
                </div>

                <select class="filter-dropdown neumorphic-inset">
                    <option value="">Status</option>
                    <option value="OPEN">Open</option>
                    <option value="IN_PROGRESS">In Progress</option>
                    <option value="RESOLVED">Resolved</option>
                </select>

                <select class="filter-dropdown neumorphic-inset">
                    <option value="">Type</option>
                    <option value="P">Peticion</option>
                    <option value="Q">Queja</option>
                </select>

                <select class="filter-dropdown neumorphic-inset">
                    <option value="">Priority</option>
                    <option value="High">High</option>
                    <option value="Medium">Medium</option>
                </select>

                <select class="filter-dropdown neumorphic-inset">
                    <option value="">Agent</option>
                    <option value="Maria">Maria</option>
                </select>

                <button id="btnDashboardCreateTicket" class="neumorphic-btn btn-primary ml-auto"
                    style="color:white; background:var(--primary);">CREATE TICKET</button>
            </div>

            <!-- Table -->
            <div class="table-container neumorphic">
                <table class="tickets-table">
                    <thead>
                        <tr>
                            <th>REF CODE</th>
                            <th>SUBJECT</th>
                            <th>USER EMAIL</th>
                            <th>TYPE</th>
                            <th>STATUS</th>
                            <th>AGENT</th>
                            <th>LAST UPDATE</th>
                            <th>ACTIONS</th>
                        </tr>
                    </thead>
                    <tbody id="ticketTableBody">
                        <!-- Rendered via JS -->
                    </tbody>
                </table>
                <div class="pagination">
                    <span>1-25 of 145</span>
                    <div class="page-controls">
                        <button class="neumorphic-btn btn-sm">&lt;</button>
                        <button class="neumorphic-btn btn-sm">&gt;</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Create Ticket Modal -->
    <div id="createTicketModal" class="modal-overlay"
        style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center;">
        <div class="modal-content neumorphic"
            style="width: 400px; padding: 30px; border-radius: 12px; background: var(--bg-light);">
            <h2 style="margin-bottom: 20px; font-size: 1.5rem; color: var(--text-dark);">Create New Ticket</h2>
            <div class="input-group" style="margin-bottom: 15px;">
                <label style="display: block; margin-bottom: 5px; color: var(--text-dark);">User Email:</label>
                <input type="email" id="modalTicketEmail" placeholder="cliente@correo.com"
                    class="filter-input neumorphic-inset"
                    style="width: 100%; box-sizing: border-box; padding: 10px; border: none; margin-top: 5px;">
            </div>
            <div class="input-group" style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 5px; color: var(--text-dark);">Subject /
                    Descripción:</label>
                <input type="text" id="modalTicketSubject" placeholder="Breve descripción del problema"
                    class="filter-input neumorphic-inset"
                    style="width: 100%; box-sizing: border-box; padding: 10px; border: none; margin-top: 5px;">
            </div>
            <div style="display: flex; justify-content: flex-end; gap: 10px;">
                <button id="modalBtnCancel" class="neumorphic-btn btn-sm"
                    style="color: var(--text-dark);">Cancelar</button>
                <button id="modalBtnConfirm" class="neumorphic-btn btn-sm btn-primary"
                    style="color: white; background: var(--primary);">Crear Ticket</button>
            </div>
        </div>
    </div>

    <!-- Edit Ticket Modal -->
    <div id="editTicketModal" class="modal-overlay"
        style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center;">
        <div class="modal-content neumorphic"
            style="width: 400px; padding: 30px; border-radius: 12px; background: var(--bg-light);">
            <h2 style="margin-bottom: 20px; font-size: 1.5rem; color: var(--text-dark);">Editar Ticket</h2>
            <div class="input-group" style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 5px; color: var(--text-dark);">Nuevo User Email:</label>
                <input type="email" id="modalEditEmail" placeholder="cliente@correo.com"
                    class="filter-input neumorphic-inset"
                    style="width: 100%; box-sizing: border-box; padding: 10px; border: none; margin-top: 5px;">
            </div>
            <div style="display: flex; justify-content: flex-end; gap: 10px;">
                <button id="modalEditCancel" class="neumorphic-btn btn-sm"
                    style="color: var(--text-dark);">Cancelar</button>
                <button id="modalEditConfirm" class="neumorphic-btn btn-sm btn-primary"
                    style="color: white; background: var(--primary);">Guardar Email</button>
            </div>
        </div>
    </div>

    <script src="js/api-config.js"></script>
    <script src="js/workspace.js"></script>
</body>

</html>
